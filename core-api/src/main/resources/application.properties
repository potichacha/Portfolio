# =============================================================================
# PortLoko Core API — application.properties
# =============================================================================

# Application
quarkus.application.name=portloko-core-api
quarkus.http.port=8080

# --- Database ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:portloko}
quarkus.datasource.password=${DB_PASSWORD:portloko}
quarkus.datasource.jdbc.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/portloko}

# --- Hibernate ---
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# --- Flyway ---
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

# --- JWT ---
# Public key for verifying tokens (generated by auth service / GitHub OAuth flow)
mp.jwt.verify.publickey.location=${JWT_PUBLIC_KEY_LOCATION:keys/public.pem}
mp.jwt.verify.issuer=${JWT_ISSUER:https://portloko.dev}
quarkus.smallrye-jwt.enabled=true

# --- Typed app config (BACK-1, bound in PortLokoConfig, validated at startup) ---
portloko.github.client-id=${GITHUB_CLIENT_ID:dev-github-client-id}
portloko.github.client-secret=${GITHUB_CLIENT_SECRET:dev-github-client-secret}
portloko.claude.api-key=${CLAUDE_API_KEY:dev-claude-api-key}
portloko.runner.url=${RUNNER_URL:http://localhost:8090}

# --- CORS ---
quarkus.http.cors=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:3000}
quarkus.http.cors.methods=GET,POST,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Accept,Content-Type,Authorization
quarkus.http.cors.access-control-allow-credentials=true

# --- OpenAPI ---
quarkus.smallrye-openapi.info-title=PortLoko Core API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Backend API for PortLoko developer portfolio platform
quarkus.swagger-ui.always-include=true

# --- GitHub API ---
github.api.base-url=${GITHUB_API_BASE_URL:https://api.github.com}
github.archive.temp-dir=${GITHUB_ARCHIVE_TEMP_DIR:}
github.archive.max-bytes=${GITHUB_ARCHIVE_MAX_BYTES:52428800}

# --- Logging ---
quarkus.log.level=INFO
quarkus.log.category."com.portloko".level=DEBUG
# Mask sensitive fields in logs
quarkus.log.filter."sensitive".if-starts-with=token,secret,password,apikey

# =============================================================================
# Test profile
# =============================================================================
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:portloko_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.flyway.enabled=false
%test.mp.jwt.verify.
%test.mp.jwt.verify.issuer=https://portloko.dev
